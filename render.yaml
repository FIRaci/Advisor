databases:
  - name: advisor-db
    databaseName: ai_marketing
    user: admin
    plan: free

services:
  - type: web
    name: ai-service
    env: python
    plan: starter
    rootDir: ai_service
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: advisor-backend
    env: node
    plan: starter
    rootDir: backend
    buildCommand: "npm install && npm run build"
    startCommand: "npm start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: advisor-db
          property: connectionString
      - key: AI_SERVICE_HOSTPORT
        fromService:
          type: web
          name: ai-service
          property: hostport
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: NODE_ENV
        value: production
